<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="grammarly-disable-extension" content="true"/>
<title>receipts. — Career Transitions</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#22263A;--border:#2A2F45;
  --text:#E8EAF0;--text2:#8A90A8;--text3:#4A5070;
  --blue:#4A9EFF;--blue-dim:#0A1830;--blue-b:#4A9EFF44;
  --green:#2ECC8A;--green-dim:#081C14;--green-b:#2ECC8A44;
  --amber:#F59E0B;--amber-dim:#1C1200;--amber-b:#F59E0B44;
  --red:#F0514F;--red-dim:#1C0808;--red-b:#F0514F44;
  --teal:#22D4C8;--teal-dim:#061C1A;--teal-b:#22D4C844;
  --purple:#9B8BF8;--purple-dim:#12102A;--purple-b:#9B8BF844;
  --radius:10px;--radius-sm:6px;
  font-family:'DM Sans',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:1.25rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.875rem;border-bottom:1px solid var(--border);gap:1rem;flex-wrap:wrap}
.logo{font-size:15px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lab{font-size:9px;font-weight:400;letter-spacing:.05em;text-transform:uppercase;color:var(--text3)}
.version-badge,.privacy-pill{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500;border:1px solid}
.version-badge{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-b)}
.privacy-pill{display:flex;align-items:center;gap:5px;color:var(--teal);background:var(--teal-dim);border-color:var(--teal-b);white-space:nowrap}

/* CSS-only tab nav per project brief */
.tab-radio{display:none}
.tab-labels{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:1.25rem}
.tab-label{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text2);cursor:pointer;user-select:none;transition:all .15s}
.tab-label:hover{background:var(--surface2);color:var(--text)}
.tab-panel{display:none}

#t1:checked ~ .tab-labels label[for="t1"],
#t2:checked ~ .tab-labels label[for="t2"],
#t3:checked ~ .tab-labels label[for="t3"],
#t4:checked ~ .tab-labels label[for="t4"],
#t5:checked ~ .tab-labels label[for="t5"]{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
#t1:checked ~ .panels #p1,
#t2:checked ~ .panels #p2,
#t3:checked ~ .panels #p3,
#t4:checked ~ .panels #p4,
#t5:checked ~ .panels #p5{display:block}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.125rem;margin-bottom:.875rem}
.card-ok{background:var(--green-dim);border-color:var(--green-b)}
.card-warn{background:var(--amber-dim);border-color:var(--amber-b)}
.card-ai{background:var(--purple-dim);border-color:var(--purple-b)}
.card-teal{background:var(--teal-dim);border-color:var(--teal-b)}
.card-red{background:var(--red-dim);border-color:var(--red-b)}
.sl{font-size:12px;font-weight:600;color:var(--text2);margin:0 0 10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em}
.sl-ok{color:var(--green)}.sl-warn{color:var(--amber)}.sl-ai{color:var(--purple)}.sl-teal{color:var(--teal)}.sl-red{color:var(--red)}
.lede{font-size:13px;line-height:1.65;color:var(--text2);max-width:760px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fr3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-family:inherit}
.fg textarea{min-height:86px;resize:vertical;line-height:1.55}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue)}
.hint{font-size:11px;color:var(--text3);line-height:1.4;margin-top:2px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:.875rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.875rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.875rem}
.mc{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;min-height:76px}
.mc .lb{font-size:11px;color:var(--text3);margin:0 0 3px;text-transform:uppercase;letter-spacing:.04em}
.mc .vl{font-size:20px;font-weight:600;margin:0;font-family:'DM Mono',monospace}
.pos{color:var(--green)!important}.neg{color:var(--red)!important}.warnc{color:var(--amber)!important}.ic{color:var(--teal)!important}
.meter{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin:8px 0}
.mfill{height:100%;border-radius:99px;background:var(--blue);transition:width .4s}
.irow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;color:var(--text2);padding:6px 0;border-bottom:1px solid var(--border);gap:12px}
.irow:last-child{border-bottom:none}.irow strong{color:var(--text);font-weight:500;font-family:'DM Mono',monospace;text-align:right}
.plan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.task{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;line-height:1.55;color:var(--text2)}
.task strong{display:block;color:var(--text);font-weight:600;margin-bottom:2px}
.task.task-urgent{border-color:var(--red-b);background:var(--red-dim)}
.task.task-urgent strong{color:var(--red)}
.task.task-ok{border-color:var(--green-b);background:var(--green-dim)}
.task.task-ok strong{color:var(--green)}
.resource-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.resource{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;text-decoration:none;color:var(--text);display:block}
.resource:hover{border-color:var(--blue-b);background:var(--surface2)}
.resource strong{display:block;font-size:13px;font-weight:600;margin-bottom:3px}
.resource span{display:block;font-size:11px;color:var(--text3);line-height:1.4}
.dpre{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:'DM Mono',monospace;max-height:240px;overflow-y:auto;color:var(--text)}
.brow{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}

/* Insight card */
.insight-card{background:var(--surface2);border:1px solid var(--blue-b);border-radius:var(--radius);padding:1rem 1.125rem;margin-bottom:.875rem}
.insight-label{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px;margin-bottom:.625rem}
.insight-body{font-size:13px;line-height:1.75;color:var(--text)}
.insight-body strong{color:var(--text);font-weight:600}

/* Signal blocks */
.signal-row{display:flex;flex-direction:column;gap:6px;margin-bottom:.875rem}
.signal{display:flex;align-items:flex-start;gap:10px;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;line-height:1.55;color:var(--text2);border:1px solid var(--border)}
.signal.sig-ok{border-color:var(--green-b);background:var(--green-dim);color:#A0E8C8}
.signal.sig-warn{border-color:var(--amber-b);background:var(--amber-dim);color:#F0C97A}
.signal.sig-red{border-color:var(--red-b);background:var(--red-dim);color:#F0A0A0}
.signal i{margin-top:1px;flex-shrink:0;font-size:15px}

/* Skill checklist */
.skill-list{display:flex;flex-direction:column;gap:6px;margin:.75rem 0}
.skill-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.skill-item:hover{border-color:var(--blue-b)}
.skill-item.checked{border-color:var(--green-b);background:var(--green-dim)}
.skill-item input[type="checkbox"]{width:15px;height:15px;accent-color:var(--green);flex-shrink:0;margin-top:2px;cursor:pointer}
.skill-item .sk-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.skill-item .sk-desc{font-size:11px;color:var(--text3);line-height:1.35;margin-top:2px}
.skill-item.checked .sk-name{color:var(--green)}
.skill-loading{font-size:13px;color:var(--text3);padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px}

/* ROI assessment (reentry) */
.roi-task-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid var(--border)}
.roi-task-row:last-child{border-bottom:none}
.roi-bullets{background:var(--surface2);border:1px solid var(--green-b);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap}
.add-task-row{display:flex;gap:8px;margin-top:8px}
.add-task-row input{flex:1;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-family:inherit}
.add-task-row input:focus{outline:none;border-color:var(--blue)}

/* Progress bar for readiness */
.readiness-bar{margin:.875rem 0}
.readiness-bar .rb-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.readiness-bar .rb-label strong{font-family:'DM Mono',monospace;color:var(--text)}
.rb-track{height:10px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.rb-fill{height:100%;border-radius:99px;transition:width .4s}
.rb-fill.rf-low{background:var(--red)}
.rb-fill.rf-mid{background:var(--amber)}
.rb-fill.rf-high{background:var(--green)}

/* Next tab label-button */
.next-tab-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--blue);color:#fff;font-weight:600;font-size:13px;border-radius:var(--radius-sm);cursor:pointer;border:none;margin-top:.75rem;text-decoration:none}
.next-tab-btn:hover{background:#3a8eef}

button{font-family:inherit;font-size:13px;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.btn-primary:hover{background:#3a8eef}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#061C1A;font-weight:600}
.btn-danger{color:var(--red);border-color:var(--red-b);background:var(--red-dim)}
.btn-green{background:var(--green);border-color:var(--green);color:#061C14;font-weight:600}
.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:3px}
@keyframes sp{to{transform:rotate(360deg)}}
.back-nav{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.back-nav a{display:flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-size:12px;color:var(--text2);text-decoration:none}
.back-nav a:hover{background:var(--border);color:var(--text)}
@media(max-width:680px){.fr,.fr3,.g2,.g3,.g4,.plan-grid,.resource-grid{grid-template-columns:1fr}.app{padding:1rem}.privacy-pill{display:none}}

.res-header{margin-bottom:1.25rem}
.res-orient{font-size:13px;line-height:1.65;color:var(--text2);padding:10px 14px;background:var(--surface2);border-radius:var(--radius-sm);border-left:2px solid var(--teal);margin-bottom:1.125rem}
.res-stage{margin-bottom:1.125rem}
.res-stage-hdr{display:flex;align-items:center;gap:8px;margin-bottom:.625rem}
.res-stage-num{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);flex-shrink:0}
.res-stage-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.res-count{font-size:10px;color:var(--text3);margin-left:auto;background:var(--surface2);padding:2px 7px;border-radius:99px}
.res-divider{border:none;border-top:1px solid var(--border);margin:.875rem 0}
.res-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-left:30px}
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;text-decoration:none;color:var(--text);display:block;transition:border-color .15s}
.res-card:hover{border-color:var(--blue-b);background:var(--surface2)}
.res-card-name{font-size:13px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.res-card-desc{font-size:11px;color:var(--text3);line-height:1.4;margin-bottom:4px}
.res-card-url{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.badge-gov{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600;background:var(--green-dim);color:var(--green);border:1px solid var(--green-b)}
.badge-tool{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600;background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-b)}
.badge-free{font-size:10px;padding:1px 6px;border-radius:99px;font-weight:600;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-b)}
@media(max-width:680px){.res-grid{grid-template-columns:1fr;margin-left:0}}

/* Compare table */
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:.875rem}
.compare-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:6px 10px;border-bottom:1px solid var(--border)}
.compare-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.compare-table td:first-child{font-weight:600;color:var(--text)}
.compare-table tr.winner{background:var(--green-dim)}
.compare-table tr.winner td{color:var(--text)}
.score-pill{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;font-family:'DM Mono',monospace}
.score-high{background:var(--green-dim);color:var(--green);border:1px solid var(--green-b)}
.score-mid{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-b)}
.score-low{background:var(--red-dim);color:var(--red);border:1px solid var(--red-b)}
</style>
</head>
<body>
<div id="app"></div>

<script>
window.TOOLKIT_MODE = window.TOOLKIT_MODE || 'equity';
var PROXY = 'https://myvalue.onrender.com/api/messages';

// ── Utilities ────────────────────────────────────────────────────────────────
function byId(id){return document.getElementById(id)}
function val(id){var e=byId(id);if(!e)return'';return e.type==='number'?(parseFloat(e.value)||0):(e.value||'')}
function money(n){if(!isFinite(n)||isNaN(n))return'$0';var s=n<0?'-':'';var a=Math.abs(n);if(a>=1e6)return s+'$'+(a/1e6).toFixed(2)+'M';if(a>=1000)return s+'$'+Math.round(a).toLocaleString();return s+'$'+Math.round(a)}
function esc(s){return String(s==null?'':s).replace(/[&<>\"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function compound(start,monthly,rate,years,raisePct){
  var bal=start||0,mRate=(rate||0)/100/12,m=monthly||0,total=Math.max(0,Math.round(years*12));
  for(var i=1;i<=total;i++){bal=bal*(1+mRate)+m;if(i%12===0)m*=1+(raisePct||0)/100}
  return bal;
}
function career(name,pay,fit,skill,demand,train){
  var ready=(fit*.35+skill*.45+demand*.20);
  var payScore=Math.min(100,pay/1000);
  var burden=Math.max(0,100-train*5);
  var score=payScore*.25+fit*.25+skill*.25+demand*.15+burden*.10;
  return{name:name||'Career',pay:pay,fit:fit,skill:skill,demand:demand,train:train,ready:ready,score:score};
}
function exJSON(txt){
  try{var clean=txt.replace(/```json/g,'').replace(/```/g,'').trim();var m=clean.match(/\{[\s\S]*\}/);return m?JSON.parse(m[0]):{}}catch(e){return{}}
}
async function callClaude(messages,systemPrompt,useSearch){
  var body={model:'claude-sonnet-4-20250514',max_tokens:800,system:systemPrompt,messages:messages};
  if(useSearch)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  try{
    var r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok)throw new Error('http');
    var d=await r.json();
    if(d.error)throw new Error('err');
    var txt=(d.content||[]).map(function(b){return b.type==='text'?b.text:''}).join('');
    if(!txt||txt.length<5)throw new Error('empty');
    return txt;
  }catch(e){return null}
}

// ── Reentry task ROI store ───────────────────────────────────────────────────
var reentryTasks = [];
var reentryROIOutput = '';

// ── Skill store for change tool ──────────────────────────────────────────────
var changeSkills = [];
var changeSkillsLoaded = false;
var lastChangeFetch = '';

// ── MODES ────────────────────────────────────────────────────────────────────
var MODES = {

entry:{
  icon:'ti-briefcase',badge:'v1 · Workforce Entry',title:'Workforce Entry',tone:'card-ok',
  lede:'Turn your first offer or wage into take-home pay, stability targets, and a concrete 90-day plan. Every number is a planning estimate — not advice.',
  fields:[
    ['role','Target role','text','Program assistant'],
    ['income','Gross annual pay','number','42000'],
    ['tax','Tax + payroll estimate %','number','18'],
    ['rent','Rent / housing / mo','number','950'],
    ['debt','Debt payments / mo','number','120'],
    ['basics','Food, transit, phone, basics / mo','number','780'],
    ['save','Monthly savings goal','number','250'],
    ['efund','Emergency fund saved now','number','800']
  ],
  metrics:['Take-home / mo','Monthly cushion','Savings rate','Emergency runway'],
  calc:function(v){
    var take=v.income*(1-v.tax/100)/12;
    var costs=v.rent+v.debt+v.basics+v.save;
    var net=take-costs;
    var rate=take>0?v.save/take*100:0;
    var monthlyBare=v.rent+v.debt+v.basics;
    var covered=monthlyBare>0?v.efund/monthlyBare:0;
    var monthsTo3=net>0&&v.save>0?(monthlyBare*3-Math.max(0,v.efund))/v.save:999;
    var firstRaise=v.income*1.08;
    var cushionStatus=net<0?'critical':net<200?'thin':net<600?'ok':'strong';
    var efundStatus=covered<1?'critical':covered<3?'building':'ok';
    var rateStatus=rate<5?'low':rate<10?'building':'ok';

    // Signals
    var signals=[];
    if(net<0){signals.push({cls:'sig-red',icon:'ti-alert-triangle',text:'Your current plan runs a deficit of '+money(Math.abs(net))+'/month — expenses plus savings target exceed take-home pay. You need to either reduce monthly expenses by '+money(Math.abs(net))+', lower your savings goal temporarily, or negotiate a higher starting salary.'})}
    else if(net<200){signals.push({cls:'sig-warn',icon:'ti-alert-circle',text:'The '+money(net)+'/month cushion is critically thin. Any single unplanned expense — a medical co-pay, car repair, or phone replacement — erases it. This plan is fragile until the emergency fund is built.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-circle-check',text:'The '+money(net)+'/month cushion is workable as a starting point. The priority is building your emergency fund before lifestyle creep absorbs it.'})}

    if(efundStatus==='critical'){signals.push({cls:'sig-red',icon:'ti-shield-off',text:'With only '+money(v.efund)+' saved, you have '+covered.toFixed(1)+' months of bare-minimum coverage. One job disruption could put you in debt. Building to '+money(monthlyBare)+' (1 month) is the first milestone — everything else is secondary.'})}
    else if(efundStatus==='building'){signals.push({cls:'sig-warn',icon:'ti-shield',text:'You have '+covered.toFixed(1)+' months of emergency coverage. The 3-month target of '+money(monthlyBare*3)+' would take about '+(monthsTo3<100?Math.ceil(monthsTo3)+' months at this savings rate':'a long time — consider increasing your monthly savings')+ ' to reach.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-shield-check',text:'Your emergency fund covers '+covered.toFixed(1)+' months of bare expenses. That is a meaningful buffer — now the focus shifts to growing income and building longer-term security.'})}

    if(rateStatus==='low'&&net>=0){signals.push({cls:'sig-warn',icon:'ti-trending-up',text:'A '+rate.toFixed(1)+'% savings rate won\'t build financial resilience quickly. Even adding $50/month more — by substituting one line item — compresses the timeline to your emergency fund target significantly.'})}

    // Adaptive plan
    var plan=[];
    if(net<0){
      plan.push({cls:'task-urgent',label:'Before day 1',text:'Run a revised budget: identify one expense to cut by '+money(Math.abs(net)+50)+' to get the plan into surplus. Do this before accepting the offer.'});
      plan.push({cls:'',label:'Negotiate the offer',text:'Even a $2,000 increase in starting salary — often achievable with one ask — adds '+money(2000*(1-v.tax/100)/12)+'/month net. The cost to the employer is low; the impact to you is high.'});
    }else{
      plan.push({cls:'',label:'Before day 1',text:'Confirm offer math: gross pay, pay cycle, benefits start date, commute cost, and payroll withholding. Then split direct deposit: '+money(v.save)+'/mo straight to savings, the rest to checking.'});
    }
    plan.push({cls:'',label:'Week 1: Money stack',text:'Open a high-yield savings account if you don\'t have one. Set up automatic transfers on payday. Remove friction from saving — it should require an action to spend savings, not to save.'});
    plan.push({cls:'',label:'Days 1-30: Proof habit',text:'Start a brag log — one sentence per week documenting what you did, who it helped, and the result. Performance reviews reward people who remember their wins, not just the ones who work hardest.'});
    plan.push({cls:'',label:'Days 31-90: Define "more"',text:'Ask your manager what "ready for more responsibility" looks like. Get it in writing or email. Convert the answer into two measurable targets. This is the foundation of your first raise conversation.'});
    if(efundStatus!=='ok'){plan.push({cls:'',label:'Milestone: '+money(monthlyBare)+' saved',text:'Once you hit one month of bare expenses saved, you have graduated from financial emergency mode. This is the first real stability milestone — worth marking and telling someone about.'})}

    // Rows
    var rows=[
      ['Monthly take-home (estimated)',money(take)],
      ['Total committed expenses + savings',money(costs)],
      ['Monthly cushion',money(net)],
      ['Emergency fund: 1-month target',money(monthlyBare)],
      ['Emergency fund: 3-month target',money(monthlyBare*3)],
      ['Months to 3-month fund at current pace',monthsTo3<100?Math.ceil(monthsTo3)+' mo':'Not on track'],
      ['First raise target at +8%',money(firstRaise)+'/yr']
    ];

    var narrative='';
    if(net<0){
      narrative='<strong>The plan as entered is in deficit.</strong> Take-home pay of '+money(take)+'/month doesn\'t cover committed expenses of '+money(costs)+'/month. Before accepting the offer, either renegotiate the salary, reduce a line item, or lower the savings goal temporarily — and treat that as a specific target to restore within 90 days, not a permanent cut.';
    }else if(net<200){
      narrative='<strong>The plan is technically in surplus, but barely.</strong> A '+money(net)+'/month cushion at this income level leaves almost no tolerance for variation. The emergency fund of '+money(v.efund)+' covers '+covered.toFixed(1)+' months of bare expenses — the goal is 3 months ('+money(monthlyBare*3)+'). At the current '+money(v.save)+'/month savings rate, that takes about '+(monthsTo3<100?Math.ceil(monthsTo3)+' months':' a long time')+'. The highest-ROI action is negotiating the starting salary before accepting the offer.';
    }else{
      narrative='<strong>The plan is viable.</strong> Take-home of '+money(take)+'/month leaves '+money(net)+' in cushion after expenses and savings. The current emergency fund of '+money(v.efund)+' covers '+covered.toFixed(1)+' months — '+(efundStatus==='ok'?'you\'ve cleared the 3-month threshold, which is a real milestone.':'the 3-month target of '+money(monthlyBare*3)+' is '+(monthsTo3<100?Math.ceil(monthsTo3)+' months away at this pace.':'a longer road — consider increasing the monthly savings amount.'))+' The next leverage point is documenting your impact from day one so the first raise conversation has evidence behind it.';
    }

    return{
      metrics:[money(take),net>=0?money(net):'-'+money(Math.abs(net)),rate.toFixed(1)+'%',covered>=90?'Stable':covered.toFixed(1)+' mo'],
      cls:['ic',net>=0?(net<200?'warnc':'pos'):'neg',rateStatus==='low'?'warnc':'pos',covered>=3?'pos':'warnc'],
      rows:rows,signals:signals,plan:plan,narrative:narrative
    };
  }
},

reentry:{
  icon:'ti-door-enter',badge:'v1 · Workforce Re-entry',title:'Workforce Re-entry',tone:'card-teal',
  lede:'Returning to work after a gap is evidence of resilience, adaptability, and self-direction — qualities employers value. This planner translates your gap chapter into runway data, readiness metrics, and resume-ready language.',
  fields:[
    ['target','Target role','text','Operations coordinator'],
    ['income','Target annual pay','number','52000'],
    ['current','Current monthly income','number','1200'],
    ['expenses','Monthly required expenses','number','2600'],
    ['savings','Available runway savings','number','6000'],
    ['skill','Skill match % (your estimate)','number','62'],
    ['hours','Weekly search + training hours','number','12'],
    ['months','Months until desired start','number','4']
  ],
  metrics:['Financial runway','Monthly gap','Readiness score','Weekly pace'],
  calc:function(v){
    var gap=Math.max(0,v.expenses-v.current);
    var runway=gap>0?v.savings/gap:99;
    var readiness=Math.min(100,v.skill+(v.hours*1.4)+(v.months*2));
    var monthlyTarget=v.income/12;
    var takeEstimate=v.income*.8/12;
    var runwayStatus=runway<2?'critical':runway<3?'tight':runway>=90?'covered':'ok';
    var readStatus=readiness<50?'low':readiness<75?'building':'strong';

    var signals=[];
    if(runwayStatus==='critical'){signals.push({cls:'sig-red',icon:'ti-alert-triangle',text:'With '+runway.toFixed(1)+' months of runway, your financial position is urgent. Bridge income — gig work, contract hours, part-time roles — should be the first priority over full-time applications. Applications from a stable financial position are more effective than applications made under pressure.'})}
    else if(runwayStatus==='tight'){signals.push({cls:'sig-warn',icon:'ti-alert-circle',text:runway.toFixed(1)+' months of runway is workable but tight for a '+v.months+'-month timeline. If the job search extends past that window, you\'ll need bridge income or to draw down savings further. Worth having a plan B.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-shield-check',text:'Financial runway of '+(runway>=90?'stable (current income covers expenses)':runway.toFixed(1)+' months')+' is solid for a '+v.months+'-month timeline. You can run a focused, unhurried search — which almost always produces better offers than a pressured one.'})}

    if(readStatus==='low'){signals.push({cls:'sig-warn',icon:'ti-target',text:'A '+Math.round(readiness)+'% readiness score suggests there are skill or confidence gaps to close before a heavy application push. At '+v.hours+' hours/week, you have '+(v.hours*v.months*4.33).toFixed(0)+' total build hours in this plan — enough to make meaningful progress. Focus on one credible proof asset first.'})}
    else if(readStatus==='building'){signals.push({cls:'sig-ok',icon:'ti-trending-up',text:'Readiness is building toward the 75%+ threshold where applications are most effective. The remaining '+(Math.max(0,75-readiness)).toFixed(0)+' points come from closing the skill gap and adding one strong proof asset that shows what you can do, not just what you\'ve done.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-circle-check',text:'Readiness of '+Math.round(readiness)+'% is strong. The focus shifts from preparation to execution: 4-5 tailored applications per week, warm outreach to 2-3 contacts, and one practice interview or informational conversation.'})}

    // The positive framing signal
    signals.push({cls:'sig-ok',icon:'ti-star',text:'Career gaps are common and understood by most employers. What you did during the gap — caregiving, recovery, self-directed learning, freelancing, caregiving again — demonstrates qualities the workforce needs: persistence, adaptability, and the ability to function without institutional structure. The goal is to name it clearly, not hide it.'});

    var plan=[];
    plan.push({cls:'task-ok',label:'Your gap is an asset',text:'Frame it once, clearly: "I took time for [caregiving/health/family/personal development]. During that time I [maintained X, learned Y, managed Z]. I\'m returning because [reason]. Here\'s what I bring."'});
    if(runwayStatus==='critical'||runwayStatus==='tight'){
      plan.push({cls:'task-urgent',label:'Bridge income first',text:'Before heavy applications: explore part-time, contract, or gig roles in your field. Bridge income stabilizes the search. Check 211.org, SNAP, and LIHEAP if expenses are pressing.'})}
    plan.push({cls:'',label:'Two proof assets',text:'Build a refreshed resume story and one concrete sample: a short report, a project, a certification, a volunteer engagement. Employers make decisions on evidence, not explanation.'});
    plan.push({cls:'',label:'Weekly search loop',text:'4 tailored applications, 3 warm outreach messages, 1 mock interview, 1 skills block. Consistency beats intensity — a reliable weekly rhythm produces better results than sprint-and-stall.'});
    plan.push({cls:'',label:'Translate the gap',text:'Use the ROI assessment below to turn what you\'ve been doing into dollar values and business language. Caregiving, managing a household budget, or running logistics for a community — these translate directly into resumes and interviews.'});

    var rows=[
      ['Monthly gap to cover',money(gap)],
      ['Target monthly gross',money(monthlyTarget)],
      ['Estimated take-home',money(takeEstimate)],
      ['Savings for 3-month runway',money(gap*3)],
      ['Readiness gap to 75%',Math.max(0,75-readiness).toFixed(0)+' pts'],
      ['Total build hours in plan',(v.hours*v.months*4.33).toFixed(0)+' hrs']
    ];

    var narrative='<strong>You have more to offer than the gap suggests.</strong> ';
    if(runwayStatus==='critical'){narrative+='The immediate priority is financial stability — '+(runway).toFixed(1)+' months of runway is tight. Bridge income unlocks a better search. ';}
    else{narrative+='With '+(runway>=90?'stable income coverage':runway.toFixed(1)+' months of runway')+', you have the runway to run a quality search. ';}
    narrative+='Readiness is at '+Math.round(readiness)+'% — '+(readStatus==='strong'?'strong enough to apply confidently.':readStatus==='building'?'building toward the 75% threshold where applications convert most reliably.':'there is meaningful ground to close, but the build hours in this plan are enough to get there.');

    return{
      metrics:[runway>=90?'Stable':runway.toFixed(1)+' mo',money(gap)+'/mo',Math.round(readiness)+'%',v.hours+' hrs/wk'],
      cls:[runway>=3?'pos':'warnc',gap===0?'pos':'warnc',readiness>=75?'pos':readiness>=50?'warnc':'neg',v.hours>=10?'pos':'warnc'],
      rows:rows,signals:signals,plan:plan,narrative:narrative
    };
  }
},

exit:{
  icon:'ti-sunset-2',badge:'v1 · Workforce Exit',title:'Retirement & Exit Planner',tone:'card-warn',
  lede:'Price your exit before you give notice. Healthcare, the monthly income gap, and care exposure are much harder to fix after the fact — this planner surfaces them in sequence.',
  fields:[
    ['age','Current age','number','62'],
    ['savings','Retirement savings total','number','420000'],
    ['spend','Expected monthly living cost','number','4200'],
    ['ss','Social Security estimate / mo','number','2100'],
    ['pension','Pension or annuity / mo','number','0'],
    ['rate','Expected annual return %','number','4'],
    ['withdraw','Annual withdrawal rate %','number','4'],
    ['care','Elder / healthcare reserve','number','30000']
  ],
  metrics:['Monthly income','Monthly gap','Portfolio draw','Care reserve'],
  calc:function(v){
    var nest=v.savings*v.withdraw/100/12;
    var income=v.ss+v.pension+nest;
    var gap=v.spend-income;
    var reserve=v.spend>0?v.care/v.spend:0;
    var sustainYears=nest>0?(v.savings/(nest*12)):0;
    var withdrawSafe=v.withdraw<=4;
    var gapStatus=gap<=0?'surplus':gap<500?'tight':gap<1500?'moderate':'significant';
    var annualGap=gap*12;

    var signals=[];
    if(gap>0){
      signals.push({cls:gap>1000?'sig-red':'sig-warn',icon:'ti-alert-triangle',text:'The plan has a '+money(gap)+'/month shortfall ('+money(annualGap)+'/year). Over a 20-year retirement, uncorrected this totals '+money(annualGap*20)+'. Options: delay claiming Social Security (each year from 62-70 increases benefits by ~8%), reduce spending, or work part-time initially to bridge the gap.'});
    }else{
      signals.push({cls:'sig-ok',icon:'ti-circle-check',text:'Income covers projected spending with '+money(Math.abs(gap))+'/month to spare. That buffer matters — retirement spending often surprises to the upside in the first 5 years (travel, home projects) and again after age 80 (healthcare).'});
    }

    if(!withdrawSafe){signals.push({cls:'sig-warn',icon:'ti-trending-down',text:'A '+v.withdraw+'% withdrawal rate exceeds the commonly cited 4% safe withdrawal guideline. At this rate, the portfolio has a higher probability of depletion over a 25-30 year retirement. Consider reducing to 4% ('+money(v.savings*.04/12)+'/month) or adjusting spending.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-trending-up',text:'A '+v.withdraw+'% withdrawal rate is within the sustainable range based on historical portfolio research. The portfolio generates '+money(nest)+'/month in income, and at this rate has a strong probability of lasting 25-30 years.'})}

    if(reserve<6){signals.push({cls:'sig-warn',icon:'ti-first-aid-kit',text:'The healthcare reserve of '+money(v.care)+' covers '+reserve.toFixed(1)+' months of living expenses. Most people will spend $250,000-$300,000 on healthcare in retirement above Medicare. If you\'re exiting before 65, pricing bridge coverage (COBRA or ACA) is the single most urgent pre-exit task.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-first-aid-kit',text:'The '+money(v.care)+' healthcare reserve covers '+reserve.toFixed(1)+' months of expenses. Still: price Medicare supplement (Medigap) options, review prescription coverage annually, and designate a health proxy before leaving active employment.'})}

    var plan=[];
    plan.push({cls:gap>0?'task-urgent':'',label:'Medicare + healthcare bridge',text:'If under 65: price COBRA (usually expensive), ACA marketplace plans (may be subsidized at lower retirement income), and any retiree coverage from your employer. Do this math before you give notice.'});
    plan.push({cls:'',label:'Claiming age decision',text:'Running Social Security at 62 vs 70 can differ by 75%+ per month. Use SSA.gov to model your break-even age. If you can bridge 2-3 years from savings, waiting often pays back in 10-12 years.'});
    plan.push({cls:'',label:'Three-budget stress test',text:'Run a base budget, a 20% lower budget (if a medical event or market downturn hits), and a care-event budget. If the lower budget is still livable, the exit is more resilient.'});
    plan.push({cls:'',label:'Legal and proxy readiness',text:'Health proxy, durable power of attorney, and an advance directive. These cost almost nothing and prevent families from having to make urgent decisions without guidance. Do them before you exit.'});

    var rows=[
      ['Annual spending target',money(v.spend*12)],
      ['Annual guaranteed income',money((v.ss+v.pension)*12)],
      ['Annual portfolio withdrawal',money(v.savings*v.withdraw/100)],
      ['Monthly surplus / gap',gap<=0?'+'+money(Math.abs(gap)):'-'+money(gap)],
      ['Estimated portfolio years at '+v.withdraw+'%',sustainYears>0?sustainYears.toFixed(0)+' yrs':'N/A'],
      ['Healthcare reserve in months of living cost',reserve.toFixed(1)+' mo']
    ];

    var narrative='<strong>Exit readiness is about the gaps that appear after you stop the paycheck.</strong> ';
    if(gap>500){narrative+='The '+money(gap)+'/month income shortfall is the most pressing number: it means either the exit date should move, the withdrawal rate should increase (with risk), Social Security claiming should be delayed, or part-time work bridges the first years. '}
    else if(gap>0){narrative+='The modest '+money(gap)+'/month shortfall is manageable — small spending adjustments or one-time income events could close it. '}
    else{narrative+='Income covers spending with '+money(Math.abs(gap))+'/month to spare, which is a solid position. '}
    narrative+='The healthcare picture is the second-priority variable: '+(v.age<65?'you\'re exiting before Medicare eligibility at 65 — bridge coverage pricing should happen in the next 30 days.':'Medicare eligibility is current, but supplement costs and prescription coverage should be reviewed annually.');

    return{
      metrics:[money(income),gap<=0?'+'+money(Math.abs(gap)):'-'+money(gap),money(nest)+'/mo',reserve.toFixed(1)+' mo'],
      cls:[income>=v.spend?'pos':'warnc',gap<=0?'pos':'neg',nest>0?'ic':'warnc',reserve>=6?'pos':'warnc'],
      rows:rows,signals:signals,plan:plan,narrative:narrative
    };
  }
},

equity:{
  icon:'ti-chart-arcs',badge:'v1 · Equity Builder',title:'Equity & Retirement Builder',tone:'card-ai',
  lede:'Model compound growth, find your employer match value, calculate the cost of waiting, and compare contribution scenarios across decades — before you optimize anything else.',
  fields:[
    ['age','Current age','number','32'],
    ['retire','Target retirement age','number','67'],
    ['balance','Current invested balance','number','18000'],
    ['monthly','Your monthly contribution','number','450'],
    ['match','Employer match / mo','number','150'],
    ['rate','Expected annual return %','number','6'],
    ['raise','Annual contribution increase %','number','3'],
    ['alt','Alternative monthly amount','number','250']
  ],
  metrics:['Future value','Growth on contributions','5-year delay cost','Match captured'],
  calc:function(v){
    var years=Math.max(0,v.retire-v.age);
    var fv=compound(v.balance,v.monthly+v.match,v.rate,years,v.raise);
    var contrib=(v.monthly+v.match)*12*years;
    var alt=compound(v.balance,v.alt+v.match,v.rate,years,v.raise);
    var delay=fv-compound(v.balance,v.monthly+v.match,v.rate,Math.max(0,years-5),v.raise);
    var matchAnnual=v.match*12;
    var matchTotal=v.match*12*years;
    var growth=fv-contrib-v.balance;
    var altDiff=fv-alt;
    var rateStatus=v.rate<=5?'conservative':v.rate<=8?'moderate':'aggressive';
    var matchStatus=v.match>0?'capturing':'missing';

    var signals=[];
    if(matchStatus==='missing'){signals.push({cls:'sig-warn',icon:'ti-alert-circle',text:'No employer match is entered. If your employer offers a match and you\'re not capturing it, that\'s typically a 50-100% instant return on that contribution. Capturing full match should happen before any other investment optimization.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-circle-check',text:'Capturing '+money(matchAnnual)+'/year in employer match. Over '+years.toFixed(0)+' years, that totals '+money(matchTotal)+' in additional contributions — before growth. The match alone becomes '+money(compound(0,v.match,v.rate,years,v.raise))+' after compounding at '+v.rate+'%.'})}

    if(rateStatus==='aggressive'){signals.push({cls:'sig-warn',icon:'ti-trending-up',text:'A '+v.rate+'% annual return assumption is on the aggressive side — historical average for a diversified stock portfolio is 7-8% before inflation, 5-6% after. Consider modeling at 6% to see the range, especially for plans 20+ years out.'})}

    signals.push({cls:'sig-warn',icon:'ti-clock',text:'Waiting 5 years to start or increase contributions costs roughly '+money(delay)+' in final balance at the same return rate. That\'s the cost of delay — not a scare tactic, just time value of money. The earlier years of compounding do the heaviest lifting.'});

    if(altDiff>50000){signals.push({cls:'sig-warn',icon:'ti-arrows-exchange',text:'Contributing '+money(v.alt)+'/month instead of '+money(v.monthly)+'/month produces a final balance '+money(altDiff)+' lower. That difference is larger than it looks because it compresses in the final years when account balance multiplies most.'})}

    var plan=[];
    plan.push({cls:'task-ok',label:'Step 1: Capture full match',text:'This is the only guaranteed return in investing. Calculate the exact monthly contribution needed to receive the maximum employer match — not a dollar less.'});
    plan.push({cls:'',label:'Step 2: Max HSA if eligible',text:'Health Savings Accounts are triple-tax-advantaged — contributions pre-tax, growth tax-free, withdrawals for medical tax-free. After 65 they function as a regular retirement account. Fund before taxable accounts.'});
    plan.push({cls:'',label:'Step 3: Automate increases',text:'Set contributions to increase by '+v.raise+'% annually (tied to raise cycles). Lifestyle creep is the silent killer of retirement savings — automating increases removes the decision point.'});
    plan.push({cls:'',label:'Step 4: Watch fees',text:'A 1% annual fee difference on a '+money(fv)+' portfolio is roughly '+money(fv*.01)+'/year in the final years. Review your expense ratios. Index funds typically charge 0.03-0.20%. Actively managed funds often charge 0.5-1.5%+'});

    var rows=[
      ['Years investing',years.toFixed(0)],
      ['Total you contribute',money((v.monthly)*12*years+v.balance)],
      ['Total employer match',money(matchTotal)],
      ['Growth generated',money(growth)],
      ['Final balance (projected)',money(fv)],
      ['Alternative amount outcome',money(alt)],
      ['Difference at full vs alt contribution',money(altDiff)],
      ['Value of an extra $100/mo',money(compound(v.balance,v.monthly+v.match+100,v.rate,years,v.raise)-fv)]
    ];

    var narrative='<strong>Compound growth is not linear — the last 10 years of a 35-year plan generate more than the first 25 combined.</strong> ';
    narrative+='At '+v.rate+'% return over '+years+' years, '+money(contrib+v.balance)+' in total contributions (including your '+money(matchTotal)+' in employer match) becomes '+money(fv)+'. The growth of '+money(growth)+' is pure time value. ';
    narrative+='The 5-year delay cost of '+money(delay)+' is the starkest number here: every year this plan is delayed costs roughly '+money(delay/5)+' in final balance.';

    return{
      metrics:[money(fv),money(growth),money(delay),money(matchTotal)],
      cls:['pos','ic','warnc','pos'],
      rows:rows,signals:signals,plan:plan,narrative:narrative
    };
  }
},

change:{
  icon:'ti-route',badge:'v1 · Career Change',title:'Career Change Planner',tone:'card-teal',
  lede:'Compare cost, time, and upside of a career pivot — then get AI-identified skills for your target role and check off what you already have to build an accurate readiness picture.',
  fields:[
    ['current','Current role','text','Customer support lead'],
    ['target','Target role','text','Business analyst'],
    ['nowpay','Current annual pay','number','52000'],
    ['newpay','Target annual pay','number','72000'],
    ['cost','Training / credential cost','number','3500'],
    ['months','Months to transition','number','9'],
    ['hours','Weekly build hours','number','8'],
    ['industry','Target industry (optional)','text','Finance']
  ],
  metrics:['Pay upside','Payback','Readiness','Build hours'],
  calc:function(v){
    var upside=v.newpay-v.nowpay;
    var monthlyUpside=upside/12;
    var payback=monthlyUpside>0?v.cost/monthlyUpside:0;
    // Readiness now driven by skill checklist if loaded
    var baseReadiness=60; // default before skills loaded
    var skillReadiness=baseReadiness;
    if(changeSkillsLoaded&&changeSkills.length>0){
      var checked=changeSkills.filter(function(s){return s.checked}).length;
      skillReadiness=Math.round((checked/changeSkills.length)*100);
    }
    var future=Math.min(100,skillReadiness+(v.hours*0.5));
    var upStatus=upside>10000?'strong':upside>0?'modest':'negative';
    var paybackStatus=payback>0&&payback<=12?'fast':payback<=24?'medium':'slow';

    var signals=[];
    if(upStatus==='negative'){signals.push({cls:'sig-warn',icon:'ti-trending-down',text:'The target role pays '+money(Math.abs(upside))+'/year less than your current role. This may be intentional (mission fit, better conditions, growth trajectory) — but the financial trade-off should be explicit, not overlooked.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-trending-up',text:'The pay upside is '+money(upside)+'/year. At this gap, training cost of '+money(v.cost)+' pays back in '+payback.toFixed(1)+' months after landing the new role. Over three years the net gain is roughly '+money(upside*3-v.cost)+'.'})}

    if(future<50){signals.push({cls:'sig-warn',icon:'ti-target',text:'Readiness is at '+Math.round(future)+'% — below the threshold for a confident application push. This is not discouraging; it means the build phase comes first. Use the '+(v.hours*v.months*4.33).toFixed(0)+' hours in this plan to close specific skill gaps rather than applying broadly.'})}
    else if(future<75){signals.push({cls:'sig-warn',icon:'ti-progress',text:'Readiness is building ('+Math.round(future)+'%). At this level, bridge roles that overlap both fields are worth targeting — they pay in your new direction while adding real credentials from active work, which accelerates the remaining gap faster than training alone.'})}
    else{signals.push({cls:'sig-ok',icon:'ti-circle-check',text:'Readiness of '+Math.round(future)+'% clears the threshold for active applications. Focus on proof: a work sample, a portfolio item, or a certifiable project that demonstrates target-role capability to a hiring manager who doesn\'t know you yet.'})}

    var plan=[];
    plan.push({cls:'',label:'Research first',text:'Interview 3 people who hold the target role at different companies. Ask what they actually do all day, what they wish they\'d known, and what screened them out from early roles. This data is more valuable than any job description.'});
    plan.push({cls:'',label:'Close the checklist gaps',text:'Use the skills assessment below to identify the specific gaps. Each unchecked skill is a concrete action item — not a vague shortcoming. Prioritize the 2-3 skills that appear most often in real job postings for '+esc(v.target||'the target role')+'.'});
    if(future<75){plan.push({cls:'',label:'Build one proof asset',text:'A work sample that demonstrates '+esc(v.target||'target role')+' capability is worth more than any credential to most hiring managers. It removes the "unproven" objection before the interview.'});}
    plan.push({cls:'',label:'Bridge role strategy',text:'Apply to roles where your current experience is credible AND the target-role skills appear in the job description. These roles let you add the credential from real work — the fastest readiness accelerator.'});
    plan.push({cls:'',label:'Package the story',text:'Why the shift, what transfers, what is newly proven, what risk you remove for the employer. Practice saying it in 90 seconds. This is the answer to "why are you leaving your field?"'});

    var rows=[
      ['Current annual pay',money(v.nowpay)],
      ['Target annual pay',money(v.newpay)],
      ['Pay upside per year',money(upside)],
      ['Pay upside per month',money(upside/12)],
      ['Training cost payback',payback>0?payback.toFixed(1)+' months':'N/A'],
      ['Net gain over 3 years',money(upside*3-v.cost)],
      ['Total build hours in plan',(v.hours*v.months*4.33).toFixed(0)+' hrs'],
      ['Skill readiness',Math.round(skillReadiness)+'%']
    ];

    var narrative='<strong>A career pivot is a business case, not a wish.</strong> Moving from '+esc(v.current||'the current role')+' to '+esc(v.target||'the target role')+' shows '+money(upside)+'/year in pay upside, with training cost recovering in '+payback.toFixed(1)+' months. ';
    narrative+='The readiness score of '+Math.round(future)+'% is based on '+(changeSkillsLoaded&&changeSkills.length>0?'the skill checklist below — each checked skill is a real credential, each unchecked one is a specific action.':'your input estimate — load the skills checklist for a more precise readiness picture.')+' ';
    if(future<75){narrative+='At this level, the highest-leverage action is closing 2-3 specific skill gaps through targeted projects or bridge roles before a full application push.'}
    else{narrative+='Readiness clears the application threshold — the remaining investment is in proof assets and a practiced narrative for the role transition.'}

    return{
      metrics:[money(upside)+'/yr',payback>0?payback.toFixed(1)+' mo':'N/A',Math.round(future)+'%',(v.hours*v.months*4.33).toFixed(0)+' hrs'],
      cls:[upside>0?'pos':'warnc',paybackStatus==='fast'?'pos':'warnc',future>=75?'pos':future>=50?'warnc':'neg',v.hours>=6?'ic':'warnc'],
      rows:rows,signals:signals,plan:plan,narrative:narrative
    };
  }
},

compare:{
  icon:'ti-scale',badge:'v1 · Career Compare',title:'Career Comparison',tone:'card-ai',
  lede:'Side-by-side decision analysis across up to three paths — income, fit, skill match, market demand, training burden. The score is a starting hypothesis; the signals tell you where it breaks down.',
  fields:[
    ['aName','Career A','text','Data analyst'],['aPay','A annual pay','number','78000'],['aFit','A fit %','number','72'],['aSkill','A skill match %','number','60'],['aDemand','A market demand %','number','78'],['aTrain','A training months','number','6'],
    ['bName','Career B','text','Project manager'],['bPay','B annual pay','number','85000'],['bFit','B fit %','number','68'],['bSkill','B skill match %','number','74'],['bDemand','B market demand %','number','70'],['bTrain','B training months','number','4'],
    ['cName','Career C (optional)','text','UX researcher'],['cPay','C annual pay','number','92000'],['cFit','C fit %','number','80'],['cSkill','C skill match %','number','46'],['cDemand','C market demand %','number','62'],['cTrain','C training months','number','12']
  ],
  metrics:['Strongest path','Composite score','Fastest entry','Highest pay'],
  calc:function(v){
    var all=[
      career(v.aName,v.aPay,v.aFit,v.aSkill,v.aDemand,v.aTrain),
      career(v.bName,v.bPay,v.bFit,v.bSkill,v.bDemand,v.bTrain),
      career(v.cName,v.cPay,v.cFit,v.cSkill,v.cDemand,v.cTrain)
    ].filter(function(c){return c.pay>0||c.fit>0});
    var sorted=all.slice().sort(function(x,y){return y.score-x.score});
    var fastest=all.slice().sort(function(x,y){return x.train-y.train})[0];
    var highestPay=all.slice().sort(function(x,y){return y.pay-x.pay})[0];
    var winner=sorted[0];
    var second=sorted[1];
    var scoreDiff=second?Math.round(winner.score-second.score):99;
    var isClose=scoreDiff<8;

    var signals=[];
    if(isClose&&second){
      signals.push({cls:'sig-warn',icon:'ti-equal',text:'The scores for '+esc(winner.name)+' and '+esc(second.name)+' differ by only '+scoreDiff+' points — too close to decide by score alone. The real differentiator is: which dimension matters most to you? If it\'s income certainty, '+esc(winner.pay>second.pay?winner.name:second.name)+' wins. If it\'s fastest path, that\'s '+esc(fastest.name)+'. If it\'s skill match (least to prove), that\'s '+esc(all.slice().sort(function(x,y){return y.skill-x.skill})[0].name)+'.'});
    }else{
      signals.push({cls:'sig-ok',icon:'ti-trophy',text:esc(winner.name)+' leads by '+scoreDiff+' points. The margin is significant enough that the score is directionally meaningful — though it should be validated with real job postings and a conversation with someone who holds the role.'});
    }

    // Skill match signal
    var lowestSkill=all.slice().sort(function(x,y){return x.skill-y.skill})[0];
    if(lowestSkill.skill<60){signals.push({cls:'sig-warn',icon:'ti-tools',text:esc(lowestSkill.name)+' has a '+lowestSkill.skill+'% skill match — the lowest in the comparison. Paths below 65% skill match typically require 6-12 months of active credential building before applications are competitive. That time cost should be factored into the comparison, not just the training months you entered.'})}

    // Training burden signal
    var longestTrain=all.slice().sort(function(x,y){return y.train-x.train})[0];
    if(longestTrain.train>9){signals.push({cls:'sig-warn',icon:'ti-clock',text:esc(longestTrain.name)+' requires the most training at '+longestTrain.train+' months. For paths over 9 months, consider bridge roles that let you work toward the target field while earning — they reduce financial risk and often produce better hiring results than credentials alone.'})}

    var plan=[];
    plan.push({cls:'',label:'Validate with reality',text:'The score is a model. For each path: read 10 real job postings, message 2 practitioners on LinkedIn, and search salary data on BLS.gov. Two hours of research beats two months of analysis.'});
    plan.push({cls:'',label:'Stress test the lowest-score path',text:'If one option is being dismissed because it scores lower, ask: is the model missing something? Is there a non-financial reason it keeps coming up? Scores don\'t capture fulfillment, mission fit, or lifestyle compatibility.'});
    plan.push({cls:'',label:'Pilot before committing',text:'Volunteer, freelance, or shadow in your top path for 30 days before any major training investment. Real experience produces more information than any assessment.'});
    plan.push({cls:'',label:'Use the fastest path as a hedge',text:esc(fastest.name)+' can be entered in '+fastest.train+' months. Even if it\'s not the top choice, a faster path to income provides the option value to pursue longer-horizon goals from a position of stability.'});

    // Build comparison table rows
    var tableRows=sorted.map(function(c,i){
      var scoreClass=c.score>=70?'score-high':c.score>=55?'score-mid':'score-low';
      return{name:c.name,pay:money(c.pay),fit:c.fit+'%',skill:c.skill+'%',demand:c.demand+'%',train:c.train+' mo',score:Math.round(c.score),scoreClass:scoreClass,winner:i===0};
    });

    var rows=sorted.map(function(c){
      return[c.name,'Score: '+Math.round(c.score)+'/100 · Pay: '+money(c.pay)+' · Entry: '+c.train+' mo'];
    });

    var narrative='<strong>The strongest composite path is '+esc(winner.name)+'</strong> with a score of '+Math.round(winner.score)+'/100. ';
    if(isClose&&second){narrative+='But '+esc(second.name)+' scores within '+scoreDiff+' points — close enough that the decision should turn on the dimension that matters most to you personally, not the composite. ';}
    narrative+='The fastest entry is '+esc(fastest.name)+' at '+fastest.train+' months. The highest-paying option is '+esc(highestPay.name)+' at '+money(highestPay.pay)+'. ';
    narrative+='Use the signals below to identify where the score is most likely to mislead, then validate the top path with real job postings before investing in training.';

    return{
      metrics:[winner.name,Math.round(winner.score)+'/100',fastest.name+' ('+fastest.train+' mo)',money(highestPay.pay)],
      cls:['pos','pos',fastest.train<=6?'pos':'warnc','ic'],
      rows:rows,signals:signals,plan:plan,narrative:narrative,tableRows:tableRows
    };
  }
}

function toggleSkill(idx){
  if(!changeSkills[idx])return;
  changeSkills[idx].checked=!changeSkills[idx].checked;

}

async function loadChangeSkills(){
  var v={};
  MODES.change.fields.forEach(function(f){v[f[0]]=val(f[0])});
  var target=v.target||'business analyst';
  var current=v.current||'';
  var industry=v.industry||'';
  var fetchKey=target+'|'+industry;

  var sec=byId('skills-section');
  if(!sec)return;
  sec.innerHTML='<div class="card card-teal"><p class="sl sl-teal"><i class="ti ti-checklist"></i>Skills Readiness Assessment</p><div class="skill-loading"><span class="spin"></span>Loading skills for '+esc(target)+'…</div></div>';

  var systemPrompt='You are a career skills analyst. Return ONLY valid JSON — no markdown, no explanation.';
  var userMsg='List the 10-14 most important skills for a '+target+(industry?' in the '+industry+' industry':'')+'. For each, give a short name (2-4 words) and one sentence description of why it matters for this role. Format: {"skills":[{"name":"...","desc":"..."},...]}. Focus on specific, actionable skills — not generic traits like "communication".';

  var txt=await callClaude([{role:'user',content:userMsg}],systemPrompt,false);
  var parsed={};
  if(txt){
    var clean=txt.replace(/```json/g,'').replace(/```/g,'').trim();
    var m=clean.match(/\{[\s\S]*\}/);
    try{parsed=m?JSON.parse(m[0]):{}}catch(e){parsed={}}
  }

  if(parsed.skills&&parsed.skills.length>0){
    changeSkills=parsed.skills.map(function(s){return{name:s.name,desc:s.desc,checked:false}});
    changeSkillsLoaded=true;
    lastChangeFetch=fetchKey;
  }else{
    // Fallback skills for common roles
    changeSkills=[
      {name:'Data analysis',desc:'Interpreting datasets to identify trends and support decisions',checked:false},
      {name:'SQL querying',desc:'Extracting and manipulating data from relational databases',checked:false},
      {name:'Requirements gathering',desc:'Documenting business needs from stakeholders clearly',checked:false},
      {name:'Process mapping',desc:'Visualizing workflows to identify gaps and inefficiencies',checked:false},
      {name:'Stakeholder communication',desc:'Translating technical findings into business language',checked:false},
      {name:'Project documentation',desc:'Creating specs, reports, and summaries for cross-team use',checked:false},
      {name:'Excel / Sheets',desc:'Advanced spreadsheet analysis and modeling',checked:false},
      {name:'Problem framing',desc:'Defining the right question before proposing solutions',checked:false}
    ];
    changeSkillsLoaded=true;
    lastChangeFetch=fetchKey;
  }
  calc();
}

    html+='<p style="font-size:13px;color:var(--text3);padding:10px 0">No activities added yet — add one below.</p>';
  }else{
    reentryTasks.forEach(function(task,i){
      html+='<div style="padding:10px 0;border-bottom:1px solid var(--border)">';

      }else if(task.loading){
        html+='<div class="skill-loading"><span class="spin"></span>Translating to business value…</div>';

        html+='<button class="btn-green" onclick="translateTask('+i+')" style="font-size:12px;margin-top:4px"><i class="ti ti-sparkles" style="font-size:12px;vertical-align:-1px"></i> Translate to ROI language</button>';

    });
  }

  html+='<input id="new-task-input" type="text" placeholder="e.g. Primary caregiver for elderly parent, Managed household budget and logistics, Homeschooled two children…" />';

    html+='<div class="brow" style="margin-top:6px"><button class="btn-primary" onclick="copyROI()"><i class="ti ti-copy" style="font-size:13px;vertical-align:-1px"></i> Copy summary</button></div></div>';

function addTask(){
  var inp=byId('new-task-input');
  if(!inp)return;
  var name=(inp.value||'').trim();
  if(!name)return;
  reentryTasks.push({name:name,roi:'',loading:false});
  inp.value='';
  calc();
}

function removeTask(i){
  reentryTasks.splice(i,1);
  calc();
}

async function translateTask(i){
  var task=reentryTasks[i];
  if(!task)return;
  task.loading=true;
  calc();

  var v={};
  MODES.reentry.fields.forEach(function(f){v[f[0]]=val(f[0])});
  var target=v.target||'a professional role';
  var systemPrompt='You are a career translation expert who helps people returning to the workforce after gaps. Be encouraging, specific, and use business language. Return plain text — no JSON.';
  var userMsg='Translate this activity into 3-4 resume-ready bullet points with dollar estimates or quantified impact where possible. Activity: "'+task.name+'". The person is targeting: '+target+'. Each bullet should start with a strong action verb and include a quantified result (time saved, dollar value, number of people supported, budget managed, etc.). Be specific and confident — these activities have real business value. Also include one short sentence the person could say in an interview to frame this activity.';

  var txt=await callClaude([{role:'user',content:userMsg}],systemPrompt,false);
  task.loading=false;
  if(txt){
    task.roi=txt.trim();
    // Build combined output
    reentryROIOutput=reentryTasks.filter(function(t){return t.roi}).map(function(t){return'=== '+t.name+' ===\n'+t.roi}).join('\n\n');
  }else{
    // Fallback
    task.roi='• Managed complex logistics and scheduling across multiple priorities\n• Maintained budget discipline and resource allocation under constraint\n• Developed communication and coordination skills through direct stakeholder management\n\nInterview framing: "This period required the same skills that drive business results — planning, adaptability, communication, and managing competing priorities without institutional support."';
    reentryROIOutput=reentryTasks.filter(function(t){return t.roi}).map(function(t){return'=== '+t.name+' ===\n'+t.roi}).join('\n\n');
  }
  calc();
}

function copyROI(){
  navigator.clipboard.writeText(reentryROIOutput||'').catch(function(){});
  var el=byId('roi-section');
  if(el){el.style.outline='1px solid var(--green)';setTimeout(function(){el.style.outline=''},1200);}
}

// ── Export ────────────────────────────────────────────────────────────────────
function makeBrief(mode,v,out){
  var lines=[
    '════════════════════════════════════════════════════',
    '  receipts.  |  '+mode.title,
    '  Generated: '+new Date().toLocaleDateString(),
    '════════════════════════════════════════════════════',
    ''
  ];

  lines.push('── INPUTS ──────────────────────────────────────────');
  if(window.TOOLKIT_MODE==='compare'){
    var cNames=['Career A','Career B','Career C'];
    var cKeys=[['aName','aPay','aFit','aSkill','aDemand','aTrain'],['bName','bPay','bFit','bSkill','bDemand','bTrain'],['cName','cPay','cFit','cSkill','cDemand','cTrain']];
    cKeys.forEach(function(keys,ci){
      var cVal=v[keys[0]];
      if(!cVal&&ci===2)return;
      lines.push('');
      lines.push('  '+'─'.repeat(44));
      lines.push('  '+cNames[ci].toUpperCase()+(ci===2?' (Optional)':''));
      lines.push('  '+'─'.repeat(44));
      mode.fields.forEach(function(f){
        if(keys.indexOf(f[0])!==-1)lines.push('  '+f[1]+': '+(v[f[0]]||''));
      });
    });
  }else{
    mode.fields.forEach(function(f){
      if(f[0]==='state'&&!v[f[0]])return;
      lines.push('  '+f[1]+': '+v[f[0]]);
    });
  }
  lines.push('');

  lines.push('── KEY METRICS ─────────────────────────────────────');
  mode.metrics.forEach(function(m,i){lines.push('  '+m+': '+out.metrics[i])});
  lines.push('');

  if(out.narrative){
    lines.push('── ANALYSIS ────────────────────────────────────────');
    lines.push('  '+out.narrative.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim());
    lines.push('');
  }

  lines.push('── ACTION PLAN ─────────────────────────────────────');
  (out.plan||[]).forEach(function(p){
    lines.push('  '+p.label);
    lines.push('  '+p.text);
    lines.push('');
  });

  if(window.TOOLKIT_MODE==='compare'&&out.tableRows){
    lines.push('── CAREER COMPARISON ───────────────────────────────');
    lines.push('');
    out.tableRows.forEach(function(r,i){
      lines.push('  '+'─'.repeat(44));
      lines.push('  '+(i+1)+'. '+r.name.toUpperCase()+(r.winner?' ★ TOP PICK':''));
      lines.push('  '+'─'.repeat(44));
      lines.push('  Annual pay:       '+r.pay);
      lines.push('  Overall score:    '+r.score+'/100');
      lines.push('  Fit score:        '+r.fit);
      lines.push('  Skill match:      '+r.skill);
      lines.push('  Market demand:    '+r.demand);
      lines.push('  Training needed:  '+r.train+' months');
      lines.push('');
    });
  }

  if(window.TOOLKIT_MODE==='reentry'&&reentryROIOutput){
    lines.push('── GAP CHAPTER ROI ─────────────────────────────────');
    lines.push(reentryROIOutput);
    lines.push('');
  }
  if(window.TOOLKIT_MODE==='change'&&changeSkillsLoaded){
    var gaps=changeSkills.filter(function(s){return!s.checked}).map(function(s){return s.name});
    var have=changeSkills.filter(function(s){return s.checked}).map(function(s){return s.name});
    lines.push('── SKILLS READINESS ────────────────────────────────');
    if(have.length){lines.push('  Skills you have:');have.forEach(function(n){lines.push('    • '+n)});}
    lines.push('');
    if(gaps.length){
      lines.push('  Skills to build:');
      gaps.forEach(function(n){lines.push('    • '+n)});
      lines.push('');
      lines.push('  SKILL-SPECIFIC RESOURCES');
      lines.push('  '+'─'.repeat(44));
      lines.push('  • O*NET Occupation Explorer — onetonline.org');
      lines.push('    Find skill definitions, importance ratings, and which roles need each skill.');
      lines.push('');
      lines.push('  • CareerOneStop Training Finder — careeronestop.org/Toolkit/Training/find-local-training.aspx');
      lines.push('    Search for local or online training programs by skill or subject area.');
      lines.push('');
      lines.push('  • Coursera / edX — coursera.org');
      lines.push('    Self-paced certificates from top universities for most in-demand skills.');
      lines.push('');
      lines.push('  • LinkedIn Learning — linkedin.com/learning');
      lines.push('    Short skill courses with completions that show on your profile.');
      lines.push('');
      lines.push('  • YouTube — youtube.com');
      lines.push('    Free tutorials for almost every technical skill.');
      lines.push('');
    }
    lines.push('');
  }
  // Include resource links
  var key=window.TOOLKIT_MODE||'entry';
  var resData=RESOURCE_DATA[key];
  if(resData&&resData.stages){
    lines.push('── HELPFUL LINKS ───────────────────────────────────');
    resData.stages.forEach(function(stage,si){
      lines.push('');
      lines.push('  '+stage.title.toUpperCase());
      stage.links.forEach(function(lk){
        lines.push('');
        lines.push('  • '+lk.name);
        lines.push('    '+lk.url);
        lines.push('    '+lk.desc);
      });
    });
    lines.push('');
  }

  lines.push('── NOTE ────────────────────────────────────────────');
  lines.push('  Planning estimate only. Not tax, legal, investment,');
  lines.push('  or financial advice. All figures are self-reported.');
  return lines.join('\n');
}

[Full brief - paste from receipts. Export tab]';
